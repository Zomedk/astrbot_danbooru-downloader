<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danbooru 图片下载器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #555;
        }
        
        .status-panel {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            color: #666;
        }
        
        .status-value {
            font-weight: 600;
            color: #333;
        }
        
        .status-value.running {
            color: #28a745;
        }
        
        .status-value.error {
            color: #dc3545;
        }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .character-item {
            padding: 10px;
            background: #f0f0f0;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        
        .character-item:hover {
            background: #e0e0e0;
        }
        
        .character-item.selected {
            background: #007bff;
            color: white;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007bff, #0056b3);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #007bff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0056b3;
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #545b62;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        .log-container {
            max-height: 200px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .log-item {
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }
        
        .log-item:last-child {
            border-bottom: none;
        }
        
        .config-row {
            margin-bottom: 15px;
        }
        
        .config-label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        .config-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .error-list {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            padding: 10px;
            margin-top: 10px;
        }
        
        .error-item {
            color: #856404;
            font-size: 13px;
            padding: 4px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Danbooru 图片下载器</h1>
        
        <div class="card">
            <h2>📊 下载状态</h2>
            <div class="status-panel">
                <div class="status-item">
                    <span class="status-label">状态</span>
                    <span class="status-value" id="status">未运行</span>
                </div>
                <div class="status-item">
                    <span class="status-label">当前角色</span>
                    <span class="status-value" id="current">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">进度</span>
                    <span class="status-value" id="progress">0/0</span>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%;">0%</div>
            </div>
            
            <div class="button-group">
                <button class="btn btn-primary" id="startBtn" onclick="startDownload()">▶ 开始下载</button>
                <button class="btn btn-secondary" onclick="refreshStatus()">🔄 刷新状态</button>
            </div>
            
            <div class="error-list" id="errorList" style="display: none;">
                <strong>错误信息：</strong>
                <div id="errors"></div>
            </div>
        </div>
        
        <div class="card">
            <h2>🎭 选择角色</h2>
            <div class="character-grid" id="characterGrid"></div>
            <button class="btn btn-secondary" onclick="selectAll()">全选</button>
            <button class="btn btn-secondary" onclick="deselectAll()">取消全选</button>
        </div>
        
        <div class="card">
            <h2>⚙️ 配置</h2>
            <div class="config-row">
                <label class="config-label">下载数量（每个角色）</label>
                <input type="number" class="config-input" id="targetCount" value="50" min="10" max="200">
            </div>
            <div class="config-row">
                <label class="config-label">并发数</label>
                <input type="number" class="config-input" id="maxWorkers" value="10" min="1" max="20">
            </div>
        </div>
    </div>
    
    <script>
        let bridge = window.AstrBotPluginPage;
        let characters = [];
        let selectedCharacters = new Set();
        let statusInterval = null;
        
        // 初始化
        async function init() {
            await bridge.ready();
            
            // 获取角色列表
            const response = await bridge.apiGet("characters");
            if (response.success) {
                characters = response.characters;
                renderCharacters();
            }
            
            // 刷新状态
            refreshStatus();
        }
        
        // 渲染角色列表
        function renderCharacters() {
            const grid = document.getElementById("characterGrid");
            grid.innerHTML = "";
            
            characters.forEach(char => {
                const item = document.createElement("div");
                item.className = "character-item";
                item.textContent = char;
                item.onclick = () => toggleCharacter(char, item);
                grid.appendChild(item);
            });
        }
        
        // 切换角色选择
        function toggleCharacter(char, element) {
            if (selectedCharacters.has(char)) {
                selectedCharacters.delete(char);
                element.classList.remove("selected");
            } else {
                selectedCharacters.add(char);
                element.classList.add("selected");
            }
        }
        
        // 全选
        function selectAll() {
            characters.forEach(char => selectedCharacters.add(char));
            document.querySelectorAll(".character-item").forEach(el => el.classList.add("selected"));
        }
        
        // 取消全选
        function deselectAll() {
            selectedCharacters.clear();
            document.querySelectorAll(".character-item").forEach(el => el.classList.remove("selected"));
        }
        
        // 开始下载
        async function startDownload() {
            const startBtn = document.getElementById("startBtn");
            startBtn.disabled = true;
            startBtn.textContent = "下载中...";
            
            try {
                const response = await bridge.apiPost("start", {
                    characters: Array.from(selectedCharacters),
                    target_count: parseInt(document.getElementById("targetCount").value),
                    max_workers: parseInt(document.getElementById("maxWorkers").value)
                });
                
                if (response.success) {
                    startStatusPolling();
                } else {
                    alert(response.message);
                    startBtn.disabled = false;
                    startBtn.textContent = "▶ 开始下载";
                }
            } catch (e) {
                alert("启动失败: " + e.message);
                startBtn.disabled = false;
                startBtn.textContent = "▶ 开始下载";
            }
        }
        
        // 刷新状态
        async function refreshStatus() {
            try {
                const response = await bridge.apiGet("status");
                if (response.success) {
                    updateStatus(response.status);
                }
            } catch (e) {
                console.error("获取状态失败:", e);
            }
        }
        
        // 更新状态显示
        function updateStatus(status) {
            const statusEl = document.getElementById("status");
            const currentEl = document.getElementById("current");
            const progressEl = document.getElementById("progress");
            const progressBar = document.getElementById("progressBar");
            const startBtn = document.getElementById("startBtn");
            const errorList = document.getElementById("errorList");
            
            // 更新状态文本
            statusEl.textContent = status.is_running ? "运行中" : "已完成";
            statusEl.className = "status-value " + (status.is_running ? "running" : "");
            
            currentEl.textContent = status.current || "-";
            
            const progress = status.total > 0 ? Math.round((status.downloaded / status.total) * 100) : 0;
            progressEl.textContent = `${status.downloaded}/${status.total}`;
            progressBar.style.width = progress + "%";
            progressBar.textContent = progress + "%";
            
            // 更新按钮状态
            if (!status.is_running) {
                startBtn.disabled = false;
                startBtn.textContent = "▶ 开始下载";
                stopStatusPolling();
            }
            
            // 显示错误
            if (status.errors && status.errors.length > 0) {
                errorList.style.display = "block";
                document.getElementById("errors").innerHTML = status.errors.map(e => 
                    `<div class="error-item">• ${e}</div>`
                ).join("");
            } else {
                errorList.style.display = "none";
            }
        }
        
        // 开始轮询状态
        function startStatusPolling() {
            if (statusInterval) return;
            statusInterval = setInterval(refreshStatus, 1000);
        }
        
        // 停止轮询
        function stopStatusPolling() {
            if (statusInterval) {
                clearInterval(statusInterval);
                statusInterval = null;
            }
        }
        
        // 页面卸载时停止轮询
        window.addEventListener("beforeunload", stopStatusPolling);
        
        // 初始化
        init();
    </script>
</body>
</html>
