<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danbooru图片下载器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #e0e0e0;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b0b0b0;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 12px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .status-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
        }
        
        .status-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .status-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #b0b0b0;
        }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }
        
        .character-tag {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .character-tag:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(102, 126, 234, 0.5);
        }
        
        .character-tag.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }
        
        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }
        
        .message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #ef9a9a;
        }
        
        .message.info {
            background: rgba(33, 150, 243, 0.2);
            color: #90caf9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Danbooru图片下载器</h1>
        
        <div class="panel">
            <h2>📦 下载状态</h2>
            <div class="status-info">
                <span id="status-text">就绪</span>
                <span id="status-progress">0%</span>
            </div>
            <div class="status-bar">
                <div class="status-bar-fill" id="progress-bar"></div>
            </div>
            <div id="status-message" class="message info" style="display: none;"></div>
        </div>
        
        <div class="panel">
            <h2>🎭 支持的角色</h2>
            <div class="character-grid" id="character-grid">
                <div class="character-tag">加载中...</div>
            </div>
        </div>
        
        <div class="panel">
            <h2>⚙️ 下载设置</h2>
            <div class="form-group">
                <label>每个角色下载数量</label>
                <input type="number" id="target-count" value="50" min="10" max="200">
            </div>
            <div class="form-group">
                <label>并发下载数</label>
                <input type="number" id="max-workers" value="10" min="1" max="20">
            </div>
            
            <button class="btn btn-primary" id="start-btn">开始下载</button>
            <button class="btn btn-secondary" id="refresh-btn">刷新状态</button>
        </div>
    </div>
    
    <script>
        const statusText = document.getElementById('status-text');
        const statusProgress = document.getElementById('status-progress');
        const progressBar = document.getElementById('progress-bar');
        const statusMessage = document.getElementById('status-message');
        const characterGrid = document.getElementById('character-grid');
        const startBtn = document.getElementById('start-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        
        let statusInterval = null;
        
        function showMessage(text, type = 'info') {
            statusMessage.textContent = text;
            statusMessage.className = `message ${type}`;
            statusMessage.style.display = 'block';
        }
        
        function hideMessage() {
            statusMessage.style.display = 'none';
        }
        
        async function loadCharacters() {
            try {
                const response = await fetch('/api/plugin/astrbot_danbooru_downloader/api_get_characters');
                const characters = await response.json();
                
                characterGrid.innerHTML = '';
                characters.forEach(char => {
                    const tag = document.createElement('div');
                    tag.className = 'character-tag';
                    tag.textContent = char.name;
                    tag.dataset.tag = char.tag;
                    tag.addEventListener('click', () => {
                        tag.classList.toggle('selected');
                    });
                    characterGrid.appendChild(tag);
                });
            } catch (error) {
                console.error('加载角色失败:', error);
                characterGrid.innerHTML = '<div class="character-tag">加载失败</div>';
            }
        }
        
        async function getStatus() {
            try {
                const response = await fetch('/api/plugin/astrbot_danbooru_downloader/api_get_status');
                const status = await response.json();
                
                if (status.is_running) {
                    statusText.textContent = `正在下载: ${status.current_char}`;
                    statusProgress.textContent = `${status.progress}%`;
                    progressBar.style.width = `${status.progress}%`;
                    showMessage(`已下载 ${status.downloaded} 张图片`, 'info');
                    startBtn.disabled = true;
                } else {
                    statusText.textContent = '就绪';
                    statusProgress.textContent = '0%';
                    progressBar.style.width = '0%';
                    startBtn.disabled = false;
                    
                    if (status.total > 0) {
                        showMessage(`下载完成！共 ${status.total} 张图片`, 'success');
                    } else {
                        hideMessage();
                    }
                }
            } catch (error) {
                console.error('获取状态失败:', error);
            }
        }
        
        async function startDownload() {
            const targetCount = parseInt(document.getElementById('target-count').value);
            const maxWorkers = parseInt(document.getElementById('max-workers').value);
            
            try {
                const response = await fetch('/api/plugin/astrbot_danbooru_downloader/api_start_download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        target_count: targetCount,
                        max_workers: maxWorkers
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(result.message, 'success');
                    startBtn.disabled = true;
                    
                    if (!statusInterval) {
                        statusInterval = setInterval(getStatus, 1000);
                    }
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (error) {
                showMessage('启动失败: ' + error.message, 'error');
            }
        }
        
        startBtn.addEventListener('click', startDownload);
        refreshBtn.addEventListener('click', getStatus);
        
        loadCharacters();
        getStatus();
        
        if (!statusInterval) {
            statusInterval = setInterval(getStatus, 3000);
        }
    </script>
</body>
</html>
